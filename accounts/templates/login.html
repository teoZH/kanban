<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in!</title>
</head>
<body>
<h1>Sign In!</h1>
<form enctype="multipart/form-data" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</form>
<h3><a href="{% url 'password_reset' %}">Forgotten password!</a></h3>
</body>
</html>
